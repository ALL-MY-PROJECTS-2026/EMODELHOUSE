<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>E-MODELHOUSE · 가상 모델하우스</title>
  <meta name="description" content="three.js로 만든 인터랙티브 가상 모델하우스 템플릿" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 로딩 화면 -->
  <div id="loader">
    <div class="loader-inner">
      <div class="loader-logo">🏠</div>
      <h1>E-MODELHOUSE</h1>
      <p>가상 모델하우스를 준비하고 있습니다…</p>
      <div class="bar"><span id="bar-fill"></span></div>
    </div>
  </div>

  <!-- 상단 브랜드 -->
  <header id="topbar">
    <div class="brand"><span class="brand-mark">🏠</span> E-MODELHOUSE</div>
    <div class="brand-sub">84A 타입 · 34평형 · 3Bay</div>
  </header>

  <!-- 방 이동 버튼 -->
  <nav id="rooms" aria-label="공간 이동">
    <button class="room-btn active" data-room="overview">전체 조감</button>
    <button class="room-btn" data-room="living">거실</button>
    <button class="room-btn" data-room="kitchen">주방</button>
    <button class="room-btn" data-room="bedroom">침실</button>
    <button class="room-btn" data-room="bath">욕실</button>
  </nav>

  <!-- 하단 컨트롤 패널 -->
  <div id="panel">
    <div class="panel-group">
      <span class="panel-label">시간대</span>
      <button id="btn-day" class="pill active">낮</button>
      <button id="btn-night" class="pill">밤</button>
    </div>
    <div class="panel-group">
      <span class="panel-label">바닥재</span>
      <button class="swatch" data-floor="oak" style="--c:#c8a06a" title="오크"></button>
      <button class="swatch active" data-floor="walnut" style="--c:#7a5230" title="월넛"></button>
      <button class="swatch" data-floor="grey" style="--c:#9a9a9a" title="그레이"></button>
      <button class="swatch" data-floor="white" style="--c:#e8e6e0" title="화이트"></button>
    </div>
    <div class="panel-group">
      <span class="panel-label">벽지</span>
      <button class="swatch active" data-wall="ivory" style="--c:#f3efe6" title="아이보리"></button>
      <button class="swatch" data-wall="warm" style="--c:#e8d9c3" title="웜그레이"></button>
      <button class="swatch" data-wall="mint" style="--c:#d5e3dc" title="민트"></button>
      <button class="swatch" data-wall="blue" style="--c:#cdd8e6" title="블루"></button>
    </div>
    <div class="panel-group">
      <button id="btn-walk" class="pill wide">🚶 1인칭 둘러보기</button>
    </div>
  </div>

  <!-- 1인칭 안내 -->
  <div id="walk-hint" class="hidden">
    <div class="hint-card">
      <strong>1인칭 둘러보기</strong>
      <p><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 이동 · <kbd>마우스</kbd> 시선 · <kbd>ESC</kbd> 종료</p>
      <button id="btn-walk-start">시작하기</button>
    </div>
  </div>

  <!-- 방 정보 툴팁 -->
  <div id="room-info"></div>

  <div id="hud">드래그: 회전 · 휠: 확대 · 우클릭: 이동</div>

  <canvas id="scene"></canvas>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>○○ 아파트 · 84A 가상 모델하우스</title>
  <meta name="description" content="○○ 아파트 84A 타입 3Bay 판상형 가상 모델하우스 (three.js)" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 로딩 -->
  <div id="loader">
    <div class="loader-inner">
      <div class="loader-logo">🏢</div>
      <h1>○○ 아파트</h1>
      <p>84A 가상 모델하우스를 준비하고 있습니다…</p>
      <div class="bar"><span id="bar-fill"></span></div>
    </div>
  </div>

  <!-- 상단 브랜드 -->
  <header id="topbar">
    <div class="brand"><span class="brand-mark">🏢</span> ○○ 아파트</div>
    <div class="brand-sub">84A · 전용 84㎡ · 3Bay 판상형</div>
    <div class="brand-spec">방3 · 욕실2 · 공급 114.49㎡ · 지하2~지상34층</div>
  </header>

  <!-- 공간 이동 -->
  <nav id="rooms" aria-label="공간 이동">
    <button class="room-btn active" data-room="overview">전체 조감</button>
    <button class="room-btn" data-room="living">거실</button>
    <button class="room-btn" data-room="kitchen">주방·식당</button>
    <button class="room-btn" data-room="master">안방</button>
    <button class="room-btn" data-room="bed">침실</button>
    <button class="room-btn" data-room="bath">욕실</button>
  </nav>

  <!-- 타입 선택기 -->
  <aside id="types" aria-label="평형 타입">
    <div class="types-title">평형 타입</div>
    <button class="type-btn" data-type="59A">59A</button>
    <button class="type-btn active" data-type="84A">84A</button>
    <button class="type-btn" data-type="84B">84B</button>
    <button class="type-btn" data-type="101">101</button>
    <div id="type-info"></div>
  </aside>

  <!-- 하단 패널 -->
  <div id="panel">
    <div class="panel-group">
      <span class="panel-label">시간대</span>
      <button id="btn-day" class="pill active">낮</button>
      <button id="btn-night" class="pill">밤</button>
    </div>
    <div class="panel-group">
      <span class="panel-label">바닥재</span>
      <button class="swatch active" data-floor="oak" style="--c:#c8a06a" title="오크"></button>
      <button class="swatch" data-floor="walnut" style="--c:#8a5a34" title="월넛"></button>
      <button class="swatch" data-floor="grey" style="--c:#9a9a9a" title="그레이"></button>
      <button class="swatch" data-floor="white" style="--c:#e8e6e0" title="화이트"></button>
    </div>
    <div class="panel-group">
      <span class="panel-label">벽지</span>
      <button class="swatch active" data-wall="ivory" style="--c:#f3efe6" title="아이보리"></button>
      <button class="swatch" data-wall="warm" style="--c:#e8d9c3" title="웜그레이"></button>
      <button class="swatch" data-wall="mint" style="--c:#d5e3dc" title="민트"></button>
      <button class="swatch" data-wall="blue" style="--c:#cdd8e6" title="블루"></button>
    </div>
    <div class="panel-group">
      <button id="btn-walk" class="pill wide">🚶 1인칭 둘러보기</button>
    </div>
  </div>

  <!-- 1인칭 안내 -->
  <div id="walk-hint" class="hidden">
    <div class="hint-card">
      <strong>1인칭 둘러보기</strong>
      <p><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 이동 · <kbd>마우스</kbd> 시선 · <kbd>ESC</kbd> 종료</p>
      <button id="btn-walk-start">거실에서 시작</button>
    </div>
  </div>

  <div id="room-info"></div>
  <div id="hud">드래그: 회전 · 휠: 확대 · 우클릭: 이동</div>

  <!-- 1인칭 미니맵 -->
  <div id="minimap" class="hidden">
    <div class="minimap-title">평면도</div>
    <canvas id="minimap-canvas" width="220" height="170"></canvas>
  </div>

  <canvas id="scene"></canvas>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
